services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      PYTHONPATH: /workspace
      # Qdrant settings
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # ASR settings
      AUDIO_RAG_ASR_MODEL_SIZE: tiny
      AUDIO_RAG_ASR_COMPUTE_TYPE: int8
      AUDIO_RAG_ASR_DEVICE: cpu
      AUDIO_RAG_ASR_VAD_FILTER: "true"
      # LLM settings
      AUDIO_RAG_USE_LLM: "true"
      AUDIO_RAG_LLM_MODEL: Qwen/Qwen2.5-1.5B-Instruct
      AUDIO_RAG_LLM_DEVICE: cpu
      AUDIO_RAG_LLM_MAX_TOKENS: "512"
    command:
      - tritonserver
      - --model-repository=/models
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - .:/workspace
      - ./model_repo:/models
      - ./tmp:/data
      - triton_cache:/root/.cache

volumes:
  triton_cache:
  qdrant_storage:
